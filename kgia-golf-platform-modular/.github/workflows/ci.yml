name: KGIA Modular Platform CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm run modules:check
      - run: npm run modules:smoke
      - run: npm --prefix apps/golf-partner-web run check
